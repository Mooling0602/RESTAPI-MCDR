name: CI

'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff
        run: uv run ruff check rest_api .github/scripts/get_link.py

      - name: Ty
        run: uv run ty check rest_api

  pack:
    name: Build plugin
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Remove stale artifacts
        run: rm -f ./*.mcdr

      - name: Pack plugin
        run: uv run mcdreforged pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rest-api-mcdr
          path: ./*.mcdr
          if-no-files-found: error


